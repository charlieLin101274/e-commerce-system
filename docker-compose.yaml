services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecommerce -d ecommerce"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migration:
    build:
      context: .
      dockerfile: infra/postgres/Dockerfile
    command:
      - "-database"
      - "postgres://ecommerce:ecommerce@postgres:5432/ecommerce?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infra/api/Dockerfile
    environment:
      APP_ENV: development
      APP_HTTP_ADDRESS: :8080
      APP_DATABASE_URL: postgres://ecommerce:ecommerce@postgres:5432/ecommerce?sslmode=disable
      APP_DATABASE_MAX_CONNECTIONS: 10
      APP_JWT_SECRET: local-development-secret-at-least-32-characters
      APP_JWT_ISSUER: e-commerce-system
      APP_JWT_EXPIRATION: 24h
      APP_LOG_LEVEL: debug
    depends_on:
      migration:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

  notification-worker:
    build:
      context: .
      dockerfile: infra/api/Dockerfile
    entrypoint: ["/notification-worker"]
    environment:
      APP_ENV: development
      APP_DATABASE_URL: postgres://ecommerce:ecommerce@postgres:5432/ecommerce?sslmode=disable
      APP_DATABASE_MAX_CONNECTIONS: 10
      APP_JWT_SECRET: local-development-secret-at-least-32-characters
      APP_LOG_LEVEL: debug
    depends_on:
      migration:
        condition: service_completed_successfully

volumes:
  postgres-data:
