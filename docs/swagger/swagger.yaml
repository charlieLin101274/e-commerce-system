basePath: /
definitions:
  cmd_api_apis.AddCartItemRequest:
    properties:
      product_id:
        type: string
      quantity:
        type: integer
    required:
    - product_id
    - quantity
    type: object
  cmd_api_apis.CampaignRequest:
    properties:
      benefit_type:
        allOf:
        - $ref: '#/definitions/models.BenefitType'
        enum:
        - fixed_amount
        - percentage
      benefit_value:
        type: integer
      categories:
        items:
          type: string
        type: array
      context_type:
        allOf:
        - $ref: '#/definitions/models.EvaluationContextType'
        enum:
        - campaign_discovery
        - cart_recall
      description:
        maxLength: 5000
        type: string
      eligibility_rule:
        $ref: '#/definitions/models.RuleGroup'
      ends_at:
        type: string
      maximum_discount_amount:
        type: integer
      name:
        maxLength: 200
        type: string
      priority:
        type: integer
      product_ids:
        items:
          type: string
        type: array
      promotion_description:
        maxLength: 5000
        type: string
      promotion_title:
        maxLength: 200
        type: string
      starts_at:
        type: string
    required:
    - benefit_type
    - benefit_value
    - ends_at
    - name
    - promotion_title
    - starts_at
    type: object
  cmd_api_apis.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  cmd_api_apis.LoginRequest:
    properties:
      email:
        maxLength: 320
        type: string
      password:
        maxLength: 72
        type: string
    required:
    - email
    - password
    type: object
  cmd_api_apis.NotificationResponse:
    properties:
      body:
        type: string
      created_at:
        type: string
      deep_link:
        type: string
      id:
        type: string
      opened_at:
        type: string
      title:
        type: string
    type: object
  cmd_api_apis.ProductRequest:
    properties:
      category:
        maxLength: 100
        type: string
      description:
        maxLength: 5000
        type: string
      name:
        maxLength: 200
        type: string
      price:
        minimum: 0
        type: integer
      status:
        allOf:
        - $ref: '#/definitions/models.ProductStatus'
        enum:
        - active
        - inactive
      stock:
        minimum: 0
        type: integer
    required:
    - name
    type: object
  cmd_api_apis.RegisterRequest:
    properties:
      email:
        maxLength: 320
        type: string
      name:
        maxLength: 100
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  cmd_api_apis.RuleEvaluateRequest:
    properties:
      context_type:
        allOf:
        - $ref: '#/definitions/models.EvaluationContextType'
        enum:
        - campaign_discovery
        - cart_recall
      facts:
        $ref: '#/definitions/models.EvaluationFacts'
    required:
    - context_type
    type: object
  cmd_api_apis.UpdateCartItemRequest:
    properties:
      quantity:
        type: integer
    required:
    - quantity
    type: object
  cmd_api_apis.UserResponse:
    properties:
      created_at:
        format: date-time
        type: string
      email:
        example: customer@example.com
        type: string
      id:
        format: uuid
        type: string
      name:
        example: Customer
        type: string
      role:
        allOf:
        - $ref: '#/definitions/models.UserRole'
        enum:
        - customer
        - admin
    type: object
  github_com_linenxing_e-commerce-system_base_response.ErrorBody:
    properties:
      code:
        example: invalid_request
        type: string
      message:
        example: request data is invalid
        type: string
    type: object
  github_com_linenxing_e-commerce-system_services_auth.AuthOutput:
    properties:
      access_token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      token_type:
        example: Bearer
        type: string
      user:
        $ref: '#/definitions/models.UserResp'
    type: object
  models.BenefitResult:
    properties:
      discount_amount:
        type: integer
      final_amount:
        type: integer
      original_amount:
        type: integer
    type: object
  models.BenefitType:
    enum:
    - fixed_amount
    - percentage
    type: string
    x-enum-varnames:
    - BenefitTypeFixedAmount
    - BenefitTypePercentage
  models.Campaign:
    properties:
      benefit_type:
        $ref: '#/definitions/models.BenefitType'
      benefit_value:
        type: integer
      categories:
        items:
          type: string
        type: array
      created_at:
        type: string
      created_by:
        type: string
      description:
        type: string
      ends_at:
        type: string
      id:
        type: string
      maximum_discount_amount:
        type: integer
      name:
        type: string
      priority:
        type: integer
      product_ids:
        items:
          type: string
        type: array
      promotion_description:
        type: string
      promotion_title:
        type: string
      published_at:
        type: string
      starts_at:
        type: string
      status:
        $ref: '#/definitions/models.CampaignStatus'
      updated_at:
        type: string
    type: object
  models.CampaignStatus:
    enum:
    - draft
    - scheduled
    - running
    - paused
    - ended
    - archived
    type: string
    x-enum-varnames:
    - CampaignStatusDraft
    - CampaignStatusScheduled
    - CampaignStatusRunning
    - CampaignStatusPaused
    - CampaignStatusEnded
    - CampaignStatusArchived
  models.CartFacts:
    properties:
      item_count:
        type: integer
      total_price:
        type: integer
    type: object
  models.CartItemResp:
    properties:
      id:
        type: string
      product:
        $ref: '#/definitions/models.ProductResp'
      quantity:
        type: integer
      subtotal:
        type: integer
    type: object
  models.CartResp:
    properties:
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/models.CartItemResp'
        type: array
      total_price:
        type: integer
    type: object
  models.ConditionDecision:
    properties:
      condition_id:
        type: string
      matched:
        type: boolean
      missing_fact:
        type: string
      reason_code:
        type: string
    type: object
  models.EvaluationContextType:
    enum:
    - campaign_discovery
    - cart_recall
    type: string
    x-enum-varnames:
    - EvaluationContextCampaignDiscovery
    - EvaluationContextCartRecall
  models.EvaluationFacts:
    properties:
      cart:
        $ref: '#/definitions/models.CartFacts'
      member:
        $ref: '#/definitions/models.MemberFacts'
      product:
        $ref: '#/definitions/models.ProductFacts'
    type: object
  models.EvaluationResult:
    properties:
      benefit_preview:
        $ref: '#/definitions/models.BenefitResult'
      campaign_id:
        type: string
      condition_decisions:
        items:
          $ref: '#/definitions/models.ConditionDecision'
        type: array
      eligible:
        type: boolean
      evaluated_at:
        type: string
      missing_facts:
        items:
          type: string
        type: array
      reason_code:
        type: string
      rule_version:
        type: integer
      validation_errors:
        items:
          type: string
        type: array
    type: object
  models.MemberFacts:
    properties:
      id:
        type: string
      level:
        type: string
      tags:
        items:
          type: string
        type: array
    type: object
  models.OrderItemResp:
    properties:
      price:
        type: integer
      product_id:
        type: string
      product_name:
        type: string
      quantity:
        type: integer
      subtotal:
        type: integer
    type: object
  models.OrderResp:
    properties:
      created_at:
        type: string
      id:
        type: string
      items:
        items:
          $ref: '#/definitions/models.OrderItemResp'
        type: array
      status:
        $ref: '#/definitions/models.OrderStatus'
      total_price:
        type: integer
    type: object
  models.OrderStatus:
    enum:
    - completed
    type: string
    x-enum-varnames:
    - OrderStatusCompleted
  models.ProductFacts:
    properties:
      category:
        type: string
      id:
        type: string
      price:
        type: integer
      status:
        $ref: '#/definitions/models.ProductStatus'
    type: object
  models.ProductResp:
    properties:
      category:
        example: electronics
        type: string
      created_at:
        type: string
      description:
        type: string
      id:
        format: uuid
        type: string
      name:
        type: string
      price:
        example: 1000
        type: integer
      status:
        allOf:
        - $ref: '#/definitions/models.ProductStatus'
        enum:
        - active
        - inactive
      stock:
        example: 10
        type: integer
      updated_at:
        type: string
    type: object
  models.ProductStatus:
    enum:
    - active
    - inactive
    type: string
    x-enum-varnames:
    - ProductStatusActive
    - ProductStatusInactive
  models.RuleCondition:
    properties:
      fact:
        type: string
      id:
        type: string
      operator:
        type: string
      value:
        items:
          type: integer
        type: array
    type: object
  models.RuleGroup:
    properties:
      conditions:
        items:
          $ref: '#/definitions/models.RuleCondition'
        type: array
      groups:
        items:
          $ref: '#/definitions/models.RuleGroup'
        type: array
      operator:
        type: string
    type: object
  models.UserResp:
    properties:
      created_at:
        format: date-time
        type: string
      email:
        example: customer@example.com
        type: string
      id:
        format: uuid
        type: string
      name:
        example: Customer
        type: string
      role:
        allOf:
        - $ref: '#/definitions/models.UserRole'
        enum:
        - customer
        - admin
    type: object
  models.UserRole:
    enum:
    - customer
    - admin
    type: string
    x-enum-varnames:
    - UserRoleCustomer
    - UserRoleAdmin
info:
  contact: {}
  description: Backend APIs for the simple e-commerce MVP.
  title: Simple E-Commerce API
  version: "1.0"
paths:
  /admin/campaigns:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Campaign'
            type: array
      security:
      - BearerAuth: []
      summary: List campaigns for admin
      tags:
      - Admin Campaigns
    post:
      consumes:
      - application/json
      parameters:
      - description: Campaign
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cmd_api_apis.CampaignRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Campaign'
      security:
      - BearerAuth: []
      summary: Create draft campaign
      tags:
      - Admin Campaigns
  /admin/campaigns/{id}:
    get:
      parameters:
      - description: Campaign ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Campaign'
      security:
      - BearerAuth: []
      summary: Get campaign for admin
      tags:
      - Admin Campaigns
    put:
      consumes:
      - application/json
      parameters:
      - description: Campaign ID
        in: path
        name: id
        required: true
        type: string
      - description: Campaign
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cmd_api_apis.CampaignRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Campaign'
      security:
      - BearerAuth: []
      summary: Update draft campaign
      tags:
      - Admin Campaigns
  /admin/campaigns/{id}/archive:
    post:
      parameters:
      - description: Campaign ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Campaign'
      security:
      - BearerAuth: []
      summary: Archive campaign
      tags:
      - Admin Campaigns
  /admin/campaigns/{id}/pause:
    post:
      parameters:
      - description: Campaign ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Campaign'
      security:
      - BearerAuth: []
      summary: Pause campaign
      tags:
      - Admin Campaigns
  /admin/campaigns/{id}/publish:
    post:
      parameters:
      - description: Campaign ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Campaign'
      security:
      - BearerAuth: []
      summary: Publish draft campaign
      tags:
      - Admin Campaigns
  /admin/campaigns/{id}/resume:
    post:
      parameters:
      - description: Campaign ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Campaign'
      security:
      - BearerAuth: []
      summary: Resume paused campaign
      tags:
      - Admin Campaigns
  /admin/campaigns/{id}/rules/evaluate:
    post:
      consumes:
      - application/json
      parameters:
      - description: Campaign ID
        in: path
        name: id
        required: true
        type: string
      - description: Evaluation context
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cmd_api_apis.RuleEvaluateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.EvaluationResult'
      security:
      - BearerAuth: []
      summary: Dry-run active campaign rules
      tags:
      - Admin Campaigns
  /admin/campaigns/{id}/rules/validate:
    post:
      parameters:
      - description: Campaign ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Validate active campaign rules
      tags:
      - Admin Campaigns
  /admin/products:
    post:
      consumes:
      - application/json
      parameters:
      - description: Product
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cmd_api_apis.ProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.ProductResp'
      security:
      - BearerAuth: []
      summary: Create product
      tags:
      - Admin Products
  /admin/products/{id}:
    delete:
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Disable product
      tags:
      - Admin Products
    put:
      consumes:
      - application/json
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      - description: Product
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cmd_api_apis.ProductRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ProductResp'
      security:
      - BearerAuth: []
      summary: Update product
      tags:
      - Admin Products
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate with email and password and return a JWT access token.
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cmd_api_apis.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_linenxing_e-commerce-system_services_auth.AuthOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_linenxing_e-commerce-system_base_response.ErrorBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_linenxing_e-commerce-system_base_response.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_linenxing_e-commerce-system_base_response.ErrorBody'
      summary: Login
      tags:
      - Authentication
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a customer account and return a JWT access token.
      parameters:
      - description: Registration request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cmd_api_apis.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_linenxing_e-commerce-system_services_auth.AuthOutput'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_linenxing_e-commerce-system_base_response.ErrorBody'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/github_com_linenxing_e-commerce-system_base_response.ErrorBody'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_linenxing_e-commerce-system_base_response.ErrorBody'
      summary: Register customer
      tags:
      - Authentication
  /campaigns:
    get:
      parameters:
      - description: Product ID used for scope matching
        in: query
        name: product_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Campaign'
            type: array
      summary: List currently active campaigns
      tags:
      - Campaigns
  /campaigns/{id}:
    get:
      parameters:
      - description: Campaign ID
        in: path
        name: id
        required: true
        type: string
      - description: Product ID used for scope matching
        in: query
        name: product_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Campaign'
      summary: Get currently active campaign
      tags:
      - Campaigns
  /campaigns/{id}/evaluate:
    post:
      parameters:
      - description: Campaign ID
        in: path
        name: id
        required: true
        type: string
      - description: Product ID used for server-side facts
        in: query
        name: product_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.EvaluationResult'
      summary: Evaluate campaign eligibility
      tags:
      - Campaigns
  /cart:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.CartResp'
      security:
      - BearerAuth: []
      summary: Get cart
      tags:
      - Cart
  /cart/items:
    post:
      consumes:
      - application/json
      parameters:
      - description: Cart item
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cmd_api_apis.AddCartItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.CartResp'
      security:
      - BearerAuth: []
      summary: Add cart item
      tags:
      - Cart
  /cart/items/{id}:
    delete:
      parameters:
      - description: Cart item ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Remove cart item
      tags:
      - Cart
    put:
      consumes:
      - application/json
      parameters:
      - description: Cart item ID
        in: path
        name: id
        required: true
        type: string
      - description: Quantity
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/cmd_api_apis.UpdateCartItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.CartResp'
      security:
      - BearerAuth: []
      summary: Update cart item
      tags:
      - Cart
  /health:
    get:
      description: Return the current API health status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/cmd_api_apis.HealthResponse'
      summary: Health check
      tags:
      - System
  /notifications:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/cmd_api_apis.NotificationResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List delivered in-app notifications
      tags:
      - Notifications
  /notifications/{id}/open:
    post:
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - BearerAuth: []
      summary: Mark an in-app notification opened
      tags:
      - Notifications
  /orders:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.OrderResp'
            type: array
      security:
      - BearerAuth: []
      summary: List my orders
      tags:
      - Orders
    post:
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.OrderResp'
      security:
      - BearerAuth: []
      summary: Create order from cart
      tags:
      - Orders
  /orders/{id}:
    get:
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.OrderResp'
      security:
      - BearerAuth: []
      summary: Get my order
      tags:
      - Orders
  /products:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.ProductResp'
            type: array
      summary: List products
      tags:
      - Products
  /products/{id}:
    get:
      parameters:
      - description: Product ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ProductResp'
      summary: Get product
      tags:
      - Products
  /users/me:
    get:
      description: Return the user represented by the bearer token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
